apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: demo-service
  annotations:
    run.googleapis.com/minScale: "20"
    run.googleapis.com/maxScale: "1000"
    run.googleapis.com/cpu-throttling: "false"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "20"
        autoscaling.knative.dev/maxScale: "1000"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      serviceAccountName: "svc@demo-project.iam.gserviceaccount.com"
      containers:
        - image: "gcr.io/demo-project/demo-service:latest"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 12
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
